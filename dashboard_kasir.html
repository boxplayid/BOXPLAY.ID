<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kasir - BOXPLAY x NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <header>
        <div class="container nav-content" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="brand" onclick="navigate('home')">
                <div style="background: var(--secondary); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(112, 0, 255, 0.4);">
                    <i class="fas fa-cash-register" style="color: #fff; font-size: 1.2rem;"></i>
                </div>
                <span class="brand-name">KASIR PANEL</span>
            </div>
            <div class="nav-right">
                <button class="btn btn-outline" onclick="logout()" style="border-color: var(--danger); color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </div>
    </header>

    <div id="dashboard-section" style="padding-top: 110px;">
        <main class="container">
            <h3 class="section-title" style="margin-top: 0;"><i class="fas fa-shopping-basket" style="color: var(--secondary);"></i> Pesanan Masuk (Real-time)</h3>
            <div class="dashboard-grid" id="kasir-orders-container" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
                <!-- Order cards generated by JS -->
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Konfigurasi Firebase -->
    <script>
        let USE_FIREBASE = true;
        let db = null;
        
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyDvMKKIFUD2Ys3MtdxDRiNFdx_OKckChpE",
                authDomain: "idboxplay-7a27f.firebaseapp.com",
                databaseURL: "https://idboxplay-7a27f-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "idboxplay-7a27f",
                storageBucket: "idboxplay-7a27f.firebasestorage.app",
                messagingSenderId: "553757223806",
                appId: "1:553757223806:web:629c586dc82fd8e5dca12f",
                measurementId: "G-J6CMR1W449"
            };
            
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("Firebase initialized successfully");
        } catch (error) {
            console.error("Error initializing Firebase, falling back to localStorage:", error);
            USE_FIREBASE = false;
        }
    </script>
    
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('pb_user_role') !== 'kasir' && sessionStorage.getItem('pb_user_role') !== 'admin') {
                window.location.href = 'login.html';
            }
            renderKasirDashboard();
        });
    </script>
</body>
</html>
