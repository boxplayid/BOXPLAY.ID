<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BOXPLAY.ID</title>
    <link rel="icon" type="image/jpeg" href="foto_boxplay/icon_aplikasi.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
    <main class="container">
        <section class="section">
            <div class="auth-card card">
                <div style="text-align:center; margin-bottom:2rem;">
                    <span class="brand-icon"><i class="fas fa-shield-alt"></i></span>
                    <h2>Login Admin</h2>
                    <p class="section-subtitle">Masuk menggunakan akun admin untuk mengelola antrian.</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input id="login-username" class="form-input" type="text" placeholder="Masukkan username admin" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div style="position: relative;">
                            <input id="login-password" class="form-input" type="password" placeholder="Masukkan password" required style="padding-right: 3.5rem;">
                            <button type="button" id="toggle-password" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); border: none; color: var(--muted); cursor: pointer; width: 2.5rem; height: 2.5rem; border-radius: 10px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.3s ease;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Masuk ke Panel Admin</button>
                </form>
                <button class="btn btn-secondary" style="margin-top:1rem; width:100%;" onclick="navigateTo('beranda.html')">Kembali ke Beranda</button>
            </div>
        </section>
    </main>

    <div id="app-toast" class="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
