<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display - Boxplay X NUD</title>
    <link rel="icon" type="image/jpeg" href="../foto_boxplay/icon_aplikasi.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="display">
    <main class="container" style="padding-top:2rem; padding-bottom:4rem;">
        <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 2rem; align-items: start;">
            <!-- Area Panggilan Utama -->
            <section class="card page-card calling-card" style="text-align:center; padding:4rem 2rem; min-height: 500px; display: flex; flex-direction: column; justify-content: center;">
                <div class="tag" style="margin-bottom: 2rem;">NOMOR SEDANG DIPANGGIL</div>
                <div id="display-current-number" style="font-size:12rem; font-weight:900; color:var(--accent); line-height: 1; letter-spacing:-0.05em; margin-bottom: 1rem;">--</div>
                <h2 id="display-current-name" style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Menunggu...</h2>
                <div id="display-current-branch" class="tag" style="font-size: 1.2rem; padding: 0.5rem 1.5rem;">SEMUA CABANG</div>
            </section>

            <!-- List Antrian Waiting -->
            <section class="card page-card">
                <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02);">
                    <h3 style="font-size: 1.2rem; font-weight: 700; color: var(--muted);"><i class="fas fa-list-ol"></i> DAFTAR TUNGGU</h3>
                </div>
                <div class="table-wrapper" style="border: none; border-radius: 0;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>NO</th>
                                <th>NAMA</th>
                                <th>CABANG</th>
                            </tr>
                        </thead>
                        <tbody id="display-waiting-list">
                            <tr>
                                <td colspan="3" style="text-align: center; padding: 2rem; color: var(--muted);">Memuat antrian...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="app-toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
