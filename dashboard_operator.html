<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operator - BOXPLAY x NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <header>
        <div class="container nav-content" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="brand" onclick="navigate('home')">
                <div style="background: var(--primary); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: var(--neon-glow);">
                    <i class="fas fa-bolt" style="color: #000; font-size: 1.2rem;"></i>
                </div>
                <span class="brand-name">OPERATOR PANEL</span>
            </div>
            <div class="nav-right">
                <button class="btn btn-outline" onclick="logout()" style="border-color: var(--danger); color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </div>
    </header>

    <div id="dashboard-section" style="padding-top: 110px;">
        <main class="container">
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                <div>
                    <h3 class="section-title" style="margin-top: 0;">Monitor Unit Real-time</h3>
                    <div class="dashboard-grid" id="units-container" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                        <!-- Unit cards generated by JS -->
                    </div>
                </div>
                <div>
                    <h3 class="section-title" style="margin-top: 0;">Antrian (Waiting List)</h3>
                    <div class="history-card" id="waiting-list-admin" style="max-height: 600px; overflow-y: auto;">
                        <!-- Waiting list injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL START SESSION -->
    <div id="modal-start" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title" style="font-weight: 800; margin-bottom: 1.5rem; color: var(--primary);">Mulai Sesi</h2>
            <div class="form-group">
                <label>Nama Pelanggan</label>
                <input type="text" id="cust-name-input" class="form-input" placeholder="Masukkan nama pelanggan..." autofocus>
            </div>
            <div class="flex gap-4" style="margin-top: 2rem;">
                <button class="btn btn-outline w-full" onclick="closeModal()">BATAL</button>
                <button id="confirm-start-btn" class="btn btn-primary w-full">MULAI MAIN</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Konfigurasi Firebase -->
    <script>
        let USE_FIREBASE = true;
        let db = null;
        
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyDvMKKIFUD2Ys3MtdxDRiNFdx_OKckChpE",
                authDomain: "idboxplay-7a27f.firebaseapp.com",
                databaseURL: "https://idboxplay-7a27f-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "idboxplay-7a27f",
                storageBucket: "idboxplay-7a27f.firebasestorage.app",
                messagingSenderId: "553757223806",
                appId: "1:553757223806:web:629c586dc82fd8e5dca12f",
                measurementId: "G-J6CMR1W449"
            };
            
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("Firebase initialized successfully");
        } catch (error) {
            console.error("Error initializing Firebase, falling back to localStorage:", error);
            USE_FIREBASE = false;
        }
    </script>
    
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('pb_user_role') !== 'operator' && sessionStorage.getItem('pb_user_role') !== 'admin') {
                window.location.href = 'login.html';
            }
            renderDashboard();
        });
    </script>
</body>
</html>
